services:
  postgres:
    image: postgres:15
    container_name: execution-os-postgres
    environment:
      POSTGRES_DB: execution_os
      POSTGRES_USER: execution_user
      POSTGRES_PASSWORD: secure123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U execution_user -d execution_os"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: execution-os-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/execution_os
      SPRING_DATASOURCE_USERNAME: execution_user
      SPRING_DATASOURCE_PASSWORD: secure123
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data:
