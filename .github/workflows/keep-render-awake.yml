name: Keep Render Service Awake

on:
  schedule:
    - cron: "*/7 * * * *"

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Render health endpoint
        run: |
          curl -s --retry 3 --max-time 10 \
          https://execution-os-backend-latest.onrender.com/api/system/health