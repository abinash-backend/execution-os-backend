name: Keep Render Service Awake

on:
  schedule:
    - cron: "*/7 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Warm up backend
        run: |
          echo "Warming up backend..."

          # Warm-up request (ignore failure)
          curl -s https://execution-os-backend-latest.onrender.com/api/system/health || true
          sleep 20

      - name: Main health check
        run: |
          echo "Running main health check..."

          curl --location --request GET 'https://execution-os-backend-latest.onrender.com/api/system/health' \
          --fail \
          --show-error \
          --max-time 120 \
          --retry 8 \
          --retry-delay 10 \
          --retry-connrefused \
          --write-out "\nHTTP Status: %{http_code}\nTotal Time: %{time_total}s\n"