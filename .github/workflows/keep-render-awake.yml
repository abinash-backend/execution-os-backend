name: Keep Render Service Awake

on:
  schedule:
    - cron: "*/7 * * * *"

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Render health endpoint
        run: |
          curl -v \
          --retry 5 \
          --retry-delay 5 \
          --retry-connrefused \
          --max-time 30 \
          --fail \
          https://execution-os-backend-latest.onrender.com/api/system/health